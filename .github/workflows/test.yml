name: CEMS-MY Test Suite

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]
  workflow_dispatch:

jobs:
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: cems_test
          MYSQL_USER: cems
          MYSQL_PASSWORD: cems123
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        volumes:
          - mysql_data:/var/lib/mysql

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathurg/setup-php@v15
        with:
          php-version: '8.2'
          extensions: mbstring, xml, bcmath, pdo_mysql, zip
          coverage: none

      - name: Install dependencies
        run: |
          composer install --no-interaction --prefer-dist

      - name: Copy environment file
        run: |
          cp .env.example .env || true
          if [ ! -f .env ]; then
            cat > .env << 'EOF'
APP_NAME=CEMS-MY
APP_ENV=testing
APP_KEY=base64:abcdefghijklmnopqrstuvwxyz123456789012=
APP_DEBUG=true
APP_URL=http://localhost

DB_CONNECTION=mysql
DB_HOST=127.0.0.1
DB_PORT=3306
DB_DATABASE=cems_test
DB_USERNAME=root
DB_PASSWORD=root

CACHE_DRIVER=array
QUEUE_CONNECTION=sync
SESSION_DRIVER=array
MAIL_MAILER=array
EOF
          fi

      - name: Generate application key
        run: php artisan key:generate --force

      - name: Clear caches
        run: |
          php artisan config:clear
          php artisan cache:clear
          php artisan route:clear
          php artisan view:clear

      - name: Run migrations and seed
        run: php artisan migrate:fresh --force --seed --seeder=DatabaseSeeder

      - name: Start application in background
        run: php artisan serve --host=127.0.0.1 --port=8000 &
        background: true

      - name: Wait for server to be ready
        run: sleep 5

      - name: Run Unit Tests
        run: php artisan test --testsuite=Unit --exclude-group=integration 2>&1 | tee test-output.txt || true

      - name: Run Feature Tests
        run: php artisan test --testsuite=Feature --exclude-group=integration 2>&1 | tee -a test-output.txt || true

      - name: Show test results
        run: |
          echo ""
          echo "========================================"
          echo "TEST RESULTS SUMMARY"
          echo "========================================"
          tail -100 test-output.txt

      - name: Upload test results
        if: always()
        run: cat test-output.txt > test-results.txt

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.txt
          retention-days: 7

  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathurg/setup-php@v15
        with:
          php-version: '8.2'
          extensions: mbstring, xml, bcmath, pdo_mysql, zip

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHP CS Fixer (Linting)
        run: |
          if [ -f vendor/bin/pint ]; then
            ./vendor/bin/pint --test 2>&1 || ./vendor/bin/pint 2>&1 || true
          else
            composer run lint || true
          fi

volumes:
  mysql_data:
