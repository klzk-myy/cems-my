name: CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: cems_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: bcmath, mysql, redis
        coverage: xdebug

    - name: Validate composer.json and composer.lock
      run: composer validate --strict

    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v4
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    - name: Create env file
      run: |
        cp .env.example .env
        php artisan key:generate
        sed -i 's/DB_HOST=127.0.0.1/DB_HOST=127.0.0.1/' .env
        sed -i 's/DB_DATABASE=cems/DB_DATABASE=cems_test/' .env
        sed -i 's/DB_USERNAME=root/DB_USERNAME=root/' .env
        sed -i 's/DB_PASSWORD=/DB_PASSWORD=root/' .env
        sed -i 's/CACHE_DRIVER=file/CACHE_DRIVER=redis/' .env
        sed -i 's/REDIS_HOST=127.0.0.1/REDIS_HOST=127.0.0.1/' .env

    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache

    - name: Run PHP Syntax Check
      run: find app -name "*.php" -exec php -l {} \; 2>&1 | grep -v "No syntax errors" | head -20

    - name: Execute tests
      run: php artisan test --parallel
      env:
        DB_CONNECTION: mysql
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_DATABASE: cems_test
        DB_USERNAME: root
        DB_PASSWORD: root
        REDIS_HOST: 127.0.0.1

    - name: Run Pint
      run: ./vendor/bin/pint --test

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: bcmath, mysql

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    - name: Run Pint
      run: ./vendor/bin/pint --test

    - name: PHPStan Analysis
      run: |
        if [ -f ./vendor/bin/phpstan ]; then
          ./vendor/bin/phpstan analyse --no-progress || true
        fi

  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Run Security Checker
      run: |
        if [ -f ./vendor/bin/security-checker ]; then
          ./vendor/bin/security-checker security:check
        else
          composer audit
        fi

    - name: Check for vulnerabilities
      run: composer audit --format=table || true
